name: gds

on:
  workflow_dispatch:
  push:
    # Don't run on project submissions:
    branches-ignore:
      - projects/tt_um_*
  pull_request:
    # Don't run on project submissions:
    paths-ignore:
      - projects/tt_um_*/**

jobs:
  gds:
    env:
      SHUTTLE_SLUG: TTIHP0p4
      PYTHONIOENCODING: utf-8
      PDK: ihp-sg13cmos5l
      PDK_ROOT: ${{ github.workspace }}/pdk
      TT_CONFIG: ihp-sg13cmos5l.yaml

    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false
          docker-images: false
          swap-storage: false
          android: false

      - name: Install ihp-sg13cmos5l PDK
        run: |
          set -euo pipefail
          git clone --branch dev https://github.com/IHP-GmbH/IHP-Open-PDK.git "$PDK_ROOT"
          git clone https://github.com/IHP-GmbH/ihp-sg13cmos5l.git "$PDK_ROOT/ihp-sg13cmos5l"
          cd "$PDK_ROOT/ihp-sg13cmos5l"
          git checkout ae7613984daf3ac2b14897321399df497278068f

          # Fix broken symlink
          ln -sf openrcx/IHP_rcx_patterns.rules "$PDK_ROOT/ihp-sg13g2/libs.tech/librelane/IHP_rcx_patterns.rules"

          python3 << 'PYEOF'
          import pathlib, subprocess

          # Patch config.tcl: add magic and netgen setup
          cfg = pathlib.Path("libs.tech/librelane/config.tcl")
          text = cfg.read_text()
          patch_lines = [
              '## magic setup',
              'set ::env(MAGICRC) "$::env(PDK_ROOT)/$::env(PDK)/libs.tech/magic/ihp-sg13cmos5l.magicrc"',
              'set ::env(MAGIC_TECH) "$::env(PDK_ROOT)/$::env(PDK)/libs.tech/magic/ihp-sg13cmos5l.tech"',
              '',
              '# netgen setup',
              'set ::env(NETGEN_SETUP) "$::env(PDK_ROOT)/$::env(PDK)/libs.tech/netgen/ihp-sg13cmos5l_setup.tcl"',
              '',
          ]
          patch = "\n".join(patch_lines) + "\n"
          text = text.replace("# GPIO Pads", patch + "# GPIO Pads")
          cfg.write_text(text)

          # Add SOURCES file
          ihp_rev = subprocess.check_output(
              ["git", "-C", str(pathlib.Path("../")), "rev-parse", "HEAD"],
              text=True
          ).strip()
          pathlib.Path("SOURCES").write_text(f"IHP-Open-PDK {ihp_rev}\n")

          # Fix DRC: remove rule_decks includes that reference undefined vars
          drc = pathlib.Path("libs.tech/klayout/tech/drc/ihp-sg13cmos5l.drc")
          drc_text = drc.read_text()
          drc_text = "\n".join(
              line for line in drc_text.splitlines()
              if not ("%include rule_decks/" in line and "layers_def" not in line)
          ) + "\n"
          drc.write_text(drc_text)
          PYEOF

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r tt-multiplexer/py/requirements.txt -r tt/requirements.txt -r verilog/dv/mux/requirements.txt

      - name: Update caravel configuration
        run: python ./tt/configure.py --update-shuttle

      - name: Install Nix and configure FOSSi cache
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-substituters = https://nix-cache.fossi-foundation.org
            extra-trusted-public-keys = nix-cache.fossi-foundation.org:3+K59iFwXqKsL7BNu6Guy0v+uTlwsxYQxjspXzqLYQs=

      - name: Harden Chip ROM
        run: |
          nix-shell $GITHUB_WORKSPACE/librelane/shell.nix --run "python -m librelane --pdk-root $PDK_ROOT --manual-pdk --pdk $PDK --to KLayout.StreamOut tt/rom/config.json"
          # Generate LEF from ODB (Magic.WriteLEF hangs on cmos5l, use OpenROAD instead)
          ROM_RUN=$(ls -d tt/rom/runs/RUN_* | head -1)
          mkdir -p $ROM_RUN/final/lef
          cat > /tmp/gen_lef.tcl << 'TCLEOF'
          read_lef [glob $::env(PDK_ROOT)/$::env(PDK)/libs.ref/sg13cmos5l_stdcell/lef/sg13cmos5l_tech.lef]
          read_lef [glob $::env(PDK_ROOT)/$::env(PDK)/libs.ref/sg13cmos5l_stdcell/lef/sg13cmos5l_stdcell.lef]
          set rom_run [lindex [glob tt/rom/runs/RUN_*] 0]
          read_def $rom_run/final/def/tt_um_chip_rom.def
          write_abstract_lef $rom_run/final/lef/tt_um_chip_rom.lef
          TCLEOF
          nix-shell $GITHUB_WORKSPACE/librelane/shell.nix --run "openroad -no_init -exit /tmp/gen_lef.tcl"

      - name: Harden tt_ctrl
        working-directory: tt-multiplexer/ol2/tt_ctrl
        run: nix-shell $GITHUB_WORKSPACE/librelane/shell.nix --run "python build.py"

      - name: Harden tt_mux
        working-directory: tt-multiplexer/ol2/tt_mux
        run: nix-shell $GITHUB_WORKSPACE/librelane/shell.nix --run "python build.py"

      - name: Copy macros
        run: python ./tt/configure.py --copy-macros

      - name: Harden tt_top
        working-directory: tt-multiplexer/ol2/tt_top
        run: nix-shell $GITHUB_WORKSPACE/librelane/shell.nix --run "python build.py"

      - name: Copy final results
        run: python ./tt/configure.py --copy-final-results

      - name: Create foundry submission directory
        run: python ./tt/configure.py --create-foundry-submission

      - name: upload GDS artifact
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: GDS
          path: tt-multiplexer/ol2/tt_top/runs/RUN_*/*

      - name: upload macros artifact
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: macros
          path: |
            tt-multiplexer/cfg/*.yaml
            tt-multiplexer/ol2/tt_top/gds/*
            tt-multiplexer/ol2/tt_top/lef/*
            tt-multiplexer/ol2/tt_top/spef/*
            tt-multiplexer/ol2/tt_top/verilog/*
            tt-multiplexer/ol2/tt_mux/runs/RUN_*/*
            tt-multiplexer/ol2/tt_ctrl/runs/RUN_*/*

      - name: upload shuttle_index.json
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: shuttle_index
          path: shuttle_index.json

      - name: Install KLayout
        shell: bash
        run: |
          wget https://github.com/TinyTapeout/klayout/releases/download/v0.29.12/klayout_0.29.12-1_amd64.deb
          sudo apt-get update && sudo apt-get install -y ./klayout_0.29.12-1_amd64.deb

      - name: Generate fill and add logo
        working-directory: fill
        run: make fill KLAYOUT_CMD=/usr/bin/klayout -j2

      - name: Rename top-level cell for IHP submission, convert to OAS
        run: |
          python fill/rename.py foundry_submission/gds/tt_ihp_wrapper_final.gds foundry_submission/gds/FMD_QNC_$SHUTTLE_SLUG.gds FMD_QNC_$SHUTTLE_SLUG
          strm2oas foundry_submission/gds/FMD_QNC_$SHUTTLE_SLUG.gds foundry_submission/gds/FMD_QNC_$SHUTTLE_SLUG.oas

      - name: upload foundry submission directory
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: foundry_submission
          path: foundry_submission

      - name: Install iverilog (for GL simulation)
        run: |
          wget https://github.com/TinyTapeout/iverilog/releases/download/13.0-git-d8c3c51/iverilog_13.0-git-d8c3c51a-1_amd64.deb
          sudo apt-get update -y
          sudo apt-get install -y ./iverilog_13.0-git-d8c3c51a-1_amd64.deb

      - name: GL simulation
        working-directory: verilog/dv/mux
        env:
          EXPECTED_REPO: ${{ github.repository }}
        run: |
          # temporary workaround for missing bits in pad_raw:
          sed -i 's/inout \[[0-9]*:0\] pad_raw/inout [63:0] pad_raw/' ../../../foundry_submission/verilog/gl/tt_ihp_wrapper.nl.v

          make clean test_mux_gl
          # make will return success even if the test fails, so check for failure in the results.xml
          ! grep failure results.xml

      - name: upload GL test results
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: gl_test_vcd
          path: |
            verilog/dv/mux/results.xml
            verilog/dv/mux/test_mux.vcd
            verilog/dv/mux/test_mux.gtkw
