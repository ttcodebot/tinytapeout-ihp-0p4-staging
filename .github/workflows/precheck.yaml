name: mpw_precheck

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['gds']
    types: [completed]

jobs:
  mpw_precheck:
    env:
      PYTHONIOENCODING: utf-8
      TO_REPO_ROOT: ${{ github.workspace }}/TO_Repo
      PDK_ROOT: ${{ github.workspace }}/IHP-Open-PDK
      PDK: ihp-sg13cmos5l

    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ihp-sg13cmos5l PDK
        run: ./scripts/setup-cmos5l.sh "$PDK_ROOT"

      - name: Checkout TO repo
        uses: actions/checkout@v4
        with:
          repository: IHP-GmbH/TO_Sep2025
          path: ${{ env.TO_REPO_ROOT }}

      - name: Install KLayout
        shell: bash
        run: |
          wget https://github.com/TinyTapeout/klayout/releases/download/v0.29.11/klayout_0.29.11-1_amd64.deb
          sudo apt-get update && sudo apt-get install -y ./klayout_0.29.11-1_amd64.deb

      - name: Download artifact (run id = ${{ github.event.workflow_run.id }})
        uses: dawidd6/action-download-artifact@v6
        id: download_artifact
        with:
          workflow: gds.yaml
          run_id: ${{ github.event.workflow_run.id }}
          workflow_conclusion: success
          name: foundry_submission
          path: tinytapeout-submission

      - name: Run DRC check
        working-directory: tinytapeout-submission
        env:
          PYTHONPATH: /usr/lib/klayout/pymod
        run: |
          python3 ${{ env.PDK_ROOT }}/ihp-sg13cmos5l/libs.tech/klayout/tech/drc/run_drc.py \
            --path "gds/tt_ihp_wrapper_final.gds" \
            --run_dir drc_results \
            --table main --no_density --no_recommended --no_offgrid 2>&1 | tee tt_ihp_wrapper_final.gds.log

          # Find the merged DRC report
          DRC_REPORT=$(find drc_results -name "*_full.lyrdb" -o -name "*_merged.lyrdb" | head -1)
          if [ -z "$DRC_REPORT" ]; then
            DRC_REPORT=$(find drc_results -name "*.lyrdb" | head -1)
          fi
          if [ -n "$DRC_REPORT" ]; then
            cp "$DRC_REPORT" tt_ihp_wrapper_final.gds.lyrdb
          fi

          # Count DRC errors from the log
          ERRORS=$(grep -oP 'Number of DRC violations: \K\d+' tt_ihp_wrapper_final.gds.log | tail -1)
          if [ -z "$ERRORS" ]; then
            # Fallback: check if klayout completed at all
            if ! grep -q "completed" tt_ihp_wrapper_final.gds.log; then
              echo "## ❌ DRC check failed to complete" | tee -a $GITHUB_STEP_SUMMARY
              exit 1
            fi
            echo "✅ DRC check passed" | tee -a $GITHUB_STEP_SUMMARY
          elif [ "$ERRORS" = "0" ]; then
            echo "✅ DRC check passed (0 violations)" | tee -a $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ DRC: $ERRORS violations found" | tee -a $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Upload precheck results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: precheck_results
          path: |
            tinytapeout-submission/tt_ihp_wrapper_final.gds.lyrdb
            tinytapeout-submission/tt_ihp_wrapper_final.gds.log

  density_check:
    env:
      PDK_ROOT: ${{ github.workspace }}/IHP-Open-PDK
      PDK: ihp-sg13cmos5l
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ihp-sg13cmos5l PDK
        run: ./scripts/setup-cmos5l.sh "$PDK_ROOT"

      - name: Install KLayout
        shell: bash
        run: |
          wget https://github.com/TinyTapeout/klayout/releases/download/v0.29.11/klayout_0.29.11-1_amd64.deb
          sudo apt-get update && sudo apt-get install -y ./klayout_0.29.11-1_amd64.deb

      - name: Download artifact (run id = ${{ github.event.workflow_run.id }})
        uses: dawidd6/action-download-artifact@v6
        id: download_artifact
        with:
          workflow: gds.yaml
          run_id: ${{ github.event.workflow_run.id }}
          workflow_conclusion: success
          name: foundry_submission
          path: ihp

      - name: Run Density check
        working-directory: ihp
        env:
          PYTHONPATH: /usr/lib/klayout/pymod
        run: |
          python3 $PDK_ROOT/ihp-sg13cmos5l/libs.tech/klayout/tech/drc/run_drc.py \
            --path=gds/tt_ihp_wrapper_final.gds \
            --density_only \
            --density_thr=4 2>&1 | tee density_report.log

          if grep -qi "Check Failed\|Violated rules" density_report.log; then
            echo "## ❌ Density errors found" | tee -a $GITHUB_STEP_SUMMARY
            grep -i "Violated rules\|Check Failed" density_report.log | tee -a $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ Density check passed" | tee -a $GITHUB_STEP_SUMMARY

      - name: Upload density check results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: density_check_results
          path: |
            ihp/density_report.xml
            ihp/density_report.log
