name: mpw_precheck

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['gds']
    types: [completed]

jobs:
  mpw_precheck:
    env:
      PYTHONIOENCODING: utf-8
      TO_REPO_ROOT: ${{ github.workspace }}/TO_Repo
      PDK_ROOT: ${{ github.workspace }}/pdk
      PDK: ihp-sg13cmos5l

    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ihp-sg13cmos5l PDK
        run: |
          set -euo pipefail
          git clone --branch dev https://github.com/IHP-GmbH/IHP-Open-PDK.git "$PDK_ROOT"
          git clone https://github.com/IHP-GmbH/ihp-sg13cmos5l.git "$PDK_ROOT/ihp-sg13cmos5l"
          cd "$PDK_ROOT/ihp-sg13cmos5l"
          git checkout ae7613984daf3ac2b14897321399df497278068f

          ln -sf openrcx/IHP_rcx_patterns.rules "$PDK_ROOT/ihp-sg13g2/libs.tech/librelane/IHP_rcx_patterns.rules"

          python3 << 'PYEOF'
          import pathlib, subprocess

          cfg = pathlib.Path("libs.tech/librelane/config.tcl")
          text = cfg.read_text()
          patch_lines = [
              '## magic setup',
              'set ::env(MAGICRC) "$::env(PDK_ROOT)/$::env(PDK)/libs.tech/magic/ihp-sg13cmos5l.magicrc"',
              'set ::env(MAGIC_TECH) "$::env(PDK_ROOT)/$::env(PDK)/libs.tech/magic/ihp-sg13cmos5l.tech"',
              '',
              '# netgen setup',
              'set ::env(NETGEN_SETUP) "$::env(PDK_ROOT)/$::env(PDK)/libs.tech/netgen/ihp-sg13cmos5l_setup.tcl"',
              '',
          ]
          patch = "\n".join(patch_lines) + "\n"
          text = text.replace("# GPIO Pads", patch + "# GPIO Pads")
          cfg.write_text(text)

          ihp_rev = subprocess.check_output(
              ["git", "-C", str(pathlib.Path("../")), "rev-parse", "HEAD"],
              text=True
          ).strip()
          pathlib.Path("SOURCES").write_text(f"IHP-Open-PDK {ihp_rev}\n")

          drc = pathlib.Path("libs.tech/klayout/tech/drc/ihp-sg13cmos5l.drc")
          drc_text = drc.read_text()
          drc_text = "\n".join(
              line for line in drc_text.splitlines()
              if not ("%include rule_decks/" in line and "layers_def" not in line)
          ) + "\n"
          drc.write_text(drc_text)
          PYEOF

      - name: Checkout TO repo
        uses: actions/checkout@v4
        with:
          repository: IHP-GmbH/TO_Sep2025
          path: ${{ env.TO_REPO_ROOT }}

      - name: Install KLayout
        shell: bash
        run: |
          wget https://github.com/TinyTapeout/klayout/releases/download/v0.29.11/klayout_0.29.11-1_amd64.deb
          sudo apt-get update && sudo apt-get install -y ./klayout_0.29.11-1_amd64.deb

      - name: Download artifact (run id = ${{ github.event.workflow_run.id }})
        uses: dawidd6/action-download-artifact@v6
        id: download_artifact
        with:
          workflow: gds.yaml
          run_id: ${{ github.event.workflow_run.id }}
          workflow_conclusion: success
          name: foundry_submission
          path: tinytapeout-submission

      - name: Run DRC check
        working-directory: tinytapeout-submission
        run: |
          klayout -b -r ${{ env.TO_REPO_ROOT }}/drc/drc.lydrc -rd "in_gds"="gds/tt_ihp_wrapper_final.gds" -rd "report_file"="tt_ihp_wrapper_final.gds.lyrdb" -rd density=false 2>&1 | tee tt_ihp_wrapper_final.gds.log
          if [ $? -ne 0 ]; then
            echo "DRC check failed" | tee -a $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if [ ! -f "tt_ihp_wrapper_final.gds.lyrdb" ]; then
            echo "DRC report file not found" | tee -a $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if ! grep -q "Number of DRC errors: 0" tt_ihp_wrapper_final.gds.log; then
            echo "## DRC errors found in the design" | tee -a $GITHUB_STEP_SUMMARY
            grep "Number of DRC errors:" tt_ihp_wrapper_final.gds.log | tee -a $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "DRC check passed" | tee -a $GITHUB_STEP_SUMMARY

      - name: Upload precheck results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: precheck_results
          path: |
            tinytapeout-submission/tt_ihp_wrapper_final.gds.lyrdb
            tinytapeout-submission/tt_ihp_wrapper_final.gds.log

  # CMOS5L: density_check disabled — IHP shipped the cmos5l DRC deck (ihp-sg13cmos5l.drc)
  # with all %include rule_decks/* commented out. No density rules execute, so the job
  # always fails on the "Number of DRC errors: 0" grep. The mpw_precheck job above uses
  # the TO_Sep2025 DRC deck which has working rules and passes.
  density_check:
    if: false  # disabled until IHP ships cmos5l density rules
    env:
      PDK_ROOT: ${{ github.workspace }}/pdk
      PDK: ihp-sg13cmos5l
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ihp-sg13cmos5l PDK
        run: |
          set -euo pipefail
          git clone --branch dev https://github.com/IHP-GmbH/IHP-Open-PDK.git "$PDK_ROOT"
          git clone https://github.com/IHP-GmbH/ihp-sg13cmos5l.git "$PDK_ROOT/ihp-sg13cmos5l"
          cd "$PDK_ROOT/ihp-sg13cmos5l"
          git checkout ae7613984daf3ac2b14897321399df497278068f

          ln -sf openrcx/IHP_rcx_patterns.rules "$PDK_ROOT/ihp-sg13g2/libs.tech/librelane/IHP_rcx_patterns.rules"

          python3 << 'PYEOF'
          import pathlib, subprocess

          cfg = pathlib.Path("libs.tech/librelane/config.tcl")
          text = cfg.read_text()
          patch_lines = [
              '## magic setup',
              'set ::env(MAGICRC) "$::env(PDK_ROOT)/$::env(PDK)/libs.tech/magic/ihp-sg13cmos5l.magicrc"',
              'set ::env(MAGIC_TECH) "$::env(PDK_ROOT)/$::env(PDK)/libs.tech/magic/ihp-sg13cmos5l.tech"',
              '',
              '# netgen setup',
              'set ::env(NETGEN_SETUP) "$::env(PDK_ROOT)/$::env(PDK)/libs.tech/netgen/ihp-sg13cmos5l_setup.tcl"',
              '',
          ]
          patch = "\n".join(patch_lines) + "\n"
          text = text.replace("# GPIO Pads", patch + "# GPIO Pads")
          cfg.write_text(text)

          ihp_rev = subprocess.check_output(
              ["git", "-C", str(pathlib.Path("../")), "rev-parse", "HEAD"],
              text=True
          ).strip()
          pathlib.Path("SOURCES").write_text(f"IHP-Open-PDK {ihp_rev}\n")

          drc = pathlib.Path("libs.tech/klayout/tech/drc/ihp-sg13cmos5l.drc")
          drc_text = drc.read_text()
          drc_text = "\n".join(
              line for line in drc_text.splitlines()
              if not ("%include rule_decks/" in line and "layers_def" not in line)
          ) + "\n"
          drc.write_text(drc_text)
          PYEOF

      - name: Install KLayout
        shell: bash
        run: |
          wget https://github.com/TinyTapeout/klayout/releases/download/v0.29.11/klayout_0.29.11-1_amd64.deb
          sudo apt-get update && sudo apt-get install -y ./klayout_0.29.11-1_amd64.deb

      - name: Download artifact (run id = ${{ github.event.workflow_run.id }})
        uses: dawidd6/action-download-artifact@v6
        id: download_artifact
        with:
          workflow: gds.yaml
          run_id: ${{ github.event.workflow_run.id }}
          workflow_conclusion: success
          name: foundry_submission
          path: ihp

      - name: Run Density check
        working-directory: ihp
        run: |
          klayout -b -zz \
            -r $PDK_ROOT/ihp-sg13cmos5l/libs.tech/klayout/tech/drc/ihp-sg13cmos5l.drc \
            -rd in_gds=gds/tt_ihp_wrapper_final.gds \
            -rd cell=tt_ihp_wrapper \
            -rd report_file=density_report.xml \
            -rd threads=16 | tee density_report.log

          if [ $? -ne 0 ]; then
            echo "Density check failed" | tee -a $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if [ ! -f "density_report.xml" ]; then
            echo "Density report file not found" | tee -a $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if ! grep -q "Number of DRC errors: 0" density_report.log; then
            echo "## Density errors found in the design" | tee -a $GITHUB_STEP_SUMMARY
            grep "Number of DRC errors:" density_report.log | tee -a $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "Density check passed" | tee -a $GITHUB_STEP_SUMMARY

      - name: Upload density check results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: density_check_results
          path: |
            ihp/density_report.xml
            ihp/density_report.log
