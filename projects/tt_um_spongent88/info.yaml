# Tiny Tapeout project information
project:
  title:        "Spongent-88 Hash Accelerator"
  author:       "Stefan Aeschbacher"
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Hardware accelerator for the Spongent-88/80/8 lightweight hash function."
  language:     "Verilog"
  clock_hz:     50000000  # 50 MHz

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "2x2"           # 2-round-unrolled core ~1800 GE + control ~300 GE; 2x2 gives comfortable margin

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_spongent88"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "spongent88_core.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "data_in[0]"
  ui[1]: "data_in[1]"
  ui[2]: "data_in[2]"
  ui[3]: "data_in[3]"
  ui[4]: "data_in[4]"
  ui[5]: "data_in[5]"
  ui[6]: "data_in[6]"
  ui[7]: "data_in[7]"

  # Outputs
  uo[0]: "data_out[0]"
  uo[1]: "data_out[1]"
  uo[2]: "data_out[2]"
  uo[3]: "data_out[3]"
  uo[4]: "data_out[4]"
  uo[5]: "data_out[5]"
  uo[6]: "data_out[6]"
  uo[7]: "data_out[7]"

  # Bidirectional pins
  uio[0]: "busy"
  uio[1]: "out_valid"
  uio[2]: "addr[0]"
  uio[3]: "addr[1] / wr_strobe"
  uio[4]: "addr[2] / rd_strobe"
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
