# Tiny Tapeout project information
project:
  title:        "Fast bfloat multiplication"      # Project title
  author:       "Julia Desmazes"      # Your name
  discord:      "essen__"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Uselessly fast bfloat16 multiplication"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     200000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_essen"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_essen.v"
    - "bf16/src/bf16_mul.v"
    - "bf16/src/booth_unsigned_mul.v"
# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "data_i[0]"
  ui[1]: "data_i[1]"
  ui[2]: "data_i[2]"
  ui[3]: "data_i[3]"
  ui[4]: "data_i[4]"
  ui[5]: "data_i[5]"
  ui[6]: "data_i[6]"
  ui[7]: "data_i[7]"

  # Outputs
  uo[0]: "res_o[0]"
  uo[1]: "res_o[1]"
  uo[2]: "res_o[2]"
  uo[3]: "res_o[3]"
  uo[4]: "res_o[4]"
  uo[5]: "res_o[5]"
  uo[6]: "res_o[6]"
  uo[7]: "res_o[7]"

  # Bidirectional pins
  uio[0]: "data_v_i"
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: "res_v_o"
  uio[7]: "res_v_early_o"

# Do not change!
yaml_version: 6
