# Tiny Tapeout project information
project:
  title:        "TinyMOA-IHP0P4-8x8"
  author:       "Ezra Wolf"
  discord:      "erstfeld"
  description:  "8x8 digital compute-in-memory (DCIM) core on an experimental IHP SG13G2 CMOS5L shuttle."
  language:     "Verilog"
  clock_hz:     50000000

  # One tile is ~167x108um
  # Largest size is 6 wide for this setup, not 8 like normal. Valid sizes:
  # Valid sizes: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2
  tiles: "1x1"

  # Top module must start with "tt_um_"
  top_module:  "tt_um_tinymoa_ihp0p4_8x8"

  # Project files
  source_files:
    - "project.v"
    - "dcim.v"
    - "compressor_8.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "data_in[0]"
  ui[1]: "data_in[1]"
  ui[2]: "data_in[2]"
  ui[3]: "data_in[3]"
  ui[4]: "data_in[4]"
  ui[5]: "data_in[5]"
  ui[6]: "data_in[6]"
  ui[7]: "data_in[7]"

  # Outputs
  uo[0]: "result[0]"
  uo[1]: "result[1]"
  uo[2]: "result[2]"
  uo[3]: "result[3]"
  uo[4]: "result[4]"
  uo[5]: "result[5]"
  uo[6]: "result[6] (zero)"
  uo[7]: "result[7] (zero)"

  # Bidirectional pins
  uio[0]: "wen (in)"
  uio[1]: "execute (in)"
  uio[2]: "read_next (in)"
  uio[3]: "acc_clear (in)"
  uio[4]: "col_sel[0] (out)"
  uio[5]: "col_sel[1] (out)"
  uio[6]: "col_sel[2] (out)"
  uio[7]: "done (out)"

# Do not change!
yaml_version: 6
