# Tiny Tapeout project information
project:
  title:        "OCP MXFP8 Streaming MAC Unit"                # Project title
  author:       "Olivier Chatelain"                           # Your name
  discord:      "evertex"                                     # Your discord handle - make sure to include the # part as well
  description:  "Streaming MAC unit supporting OCP MXFP8 (E4M3/E5M2) with shared scaling" # Short description of what your project does
  language:     "Verilog"                                     # Other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0                                             # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_chatelao_fp8_multiplier"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).  
pinout:
  # Inputs
  ui[0]: "data_in_a[0]"
  ui[1]: "data_in_a[1]"
  ui[2]: "data_in_a[2]"
  ui[3]: "data_in_a[3]"
  ui[4]: "data_in_a[4]"
  ui[5]: "data_in_a[5]"
  ui[6]: "data_in_a[6]"
  ui[7]: "data_in_a[7]"

  # Outputs
  uo[0]: "data_out[0]"
  uo[1]: "data_out[1]"
  uo[2]: "data_out[2]"
  uo[3]: "data_out[3]"
  uo[4]: "data_out[4]"
  uo[5]: "data_out[5]"
  uo[6]: "data_out[6]"
  uo[7]: "data_out[7]"

  # Bidirectional pins
  uio[0]: "data_in_b[0]"
  uio[1]: "data_in_b[1]"
  uio[2]: "data_in_b[2]"
  uio[3]: "data_in_b[3]"
  uio[4]: "data_in_b[4]"
  uio[5]: "data_in_b[5]"
  uio[6]: "data_in_b[6]"
  uio[7]: "data_in_b[7]"

# Do not change!
yaml_version: 6
