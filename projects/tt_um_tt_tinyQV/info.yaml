project:
  title:        "Borg - Tiny GPU"
  author:       "Andreas Wendleder"
  discord:      "gonsolo"
  description:  "A RISC-V SoC with a GPU featuring vertex shading, rasterization, and RGB fragment shading"
  language:     "Chisel"
  clock_hz:     0

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "4x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  top_module:  "tt_um_tt_tinyQV"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "../out/borg/verilog/tt_um_tt_tinyQV.sv"
    - "../out/borg/verilog/tinyQV_peripherals.sv"
    - "../out/borg/verilog/MulAddRecFN_e5_s11.sv"
    - "../out/borg/verilog/MulAddRecFNToRaw_preMul_e5_s11.sv"
    - "../out/borg/verilog/MulAddRecFNToRaw_postMul_e5_s11.sv"
    - "../out/borg/verilog/Borg.sv"
    - "../out/borg/verilog/instructionMemory_6x16.sv"
    - "../out/borg/verilog/registerFile_8x16.sv"
    - "../out/borg/verilog/RoundAnyRawFNToRecFN_ie5_is13_oe5_os11.sv"
    - "../out/borg/verilog/RoundRawFNToRecFN_e5_s11.sv"
    - "../out/tinyqv/verilog/tinyqv_alu.sv"
    - "../out/tinyqv/verilog/tinyqv_shifter.sv"
    - "../out/tinyqv/verilog/tinyqv_core.sv"
    - "../out/tinyqv/verilog/tinyqv_cpu.sv"
    - "../out/tinyqv/verilog/tinyqv_decoder.sv"
    - "../out/tinyqv/verilog/tinyqv_mem_ctrl.sv"
    - "../out/tinyqv/verilog/qspi_controller.sv"
    - "../out/tinyqv/verilog/tinyQV_time.sv"
    - "../out/tinyqv/verilog/tinyqv_registers.sv"
    - "../out/tinyqv/verilog/tinyQV.sv"
    - "../out/tinyqv/verilog/qspi_flash_controller.sv"
    - "../out/tinyqv/verilog/tinyqv_counter.v"
    - "../out/tinyqv/verilog/tinyqv_counter_4.sv"
    - "../out/tinyqv/verilog/tinyqv_counter_5.sv"
    - "../out/tinyqv/verilog/tinyqv_counter_7.sv"
    - "../out/borg/verilog/tqvp_uart_wrapper.sv"
    - "../out/borg/verilog/uart_rx.sv"
    - "../out/borg/verilog/uart_tx.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "Interrupt 0"
  ui[1]: "Interrupt 1"
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: "UART RX"

  # Outputs
  uo[0]: "UART TX"
  uo[1]: "UART RTS"
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: "Debug UART TX"
  uo[7]: "Debug signal / PWM"

  # Bidirectional pins
  uio[0]: "Flash CS"
  uio[1]: "SD0"
  uio[2]: "SD1"
  uio[3]: "SCK"
  uio[4]: "SD2"
  uio[5]: "SD3"
  uio[6]: "RAM A CS"
  uio[7]: "RAM B CS / PWM"

# Do not change!
yaml_version: 6
